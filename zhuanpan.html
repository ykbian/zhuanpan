* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0a00; display: flex; justify-content: center; min-height: 100vh; padding: 2rem 1rem; font-family: 'Microsoft YaHei', sans-serif; }
.wrap { text-align: center; max-width: 420px; width: 100%; }

#sbtn:active { transform: scale(0.95); }

#rbox.win { border-color: #27ae60; color: #2ecc71; }
#rbox.lose { border-color: #555; color: #aaa; }
.stats { margin-top: 10px; font-size: 13px; color: #aaa; display: flex; justify-content: center; gap: 18px; }
.stats strong { color: #ffd700; }
#hist { width: 300px; margin: 10px auto 0; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; min-height: 22px; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 12px; }
.badge.big { background: #5a0a0a; color: #f5a0a0; border: 1px solid #8B2020; }
.badge.small { background: #4a3200; color: #ffc966; border: 1px solid #7a5500; }
.badge.none { background: #2a2a2a; color: #888; border: 1px solid #444; }
.hint { font-size: 11px; color: #555; margin-top: 1rem; }

<script>
const SEG = [
  {label:'谢谢参与', bg:'#3a3a3a', fg:'#aaa', type:'none', w:40},
  {label:'手机一台', bg:'#c0392b', fg:'#fff', type:'big', w:1},
  {label:'再来一次', bg:'#a04000', fg:'#ffd700', type:'small', w:20},
  {label:'奔驰一辆', bg:'#78281f', fg:'#ffd700', type:'big', w:1},
  {label:'谢谢参与', bg:'#3a3a3a', fg:'#aaa', type:'none', w:40},
  {label:'百元现金', bg:'#784212', fg:'#ffd700', type:'small', w:10},
  {label:'大金劳',   bg:'#9a7d0a', fg:'#fff',    type:'big', w:1},
  {label:'谢谢参与', bg:'#3a3a3a', fg:'#aaa', type:'none', w:40},
  {label:'金条一根', bg:'#7d6608', fg:'#fff',    type:'big', w:1},
  {label:'再来一次', bg:'#a04000', fg:'#ffd700', type:'small', w:15},
  {label:'百万现金', bg:'#6c3483', fg:'#ffd700', type:'big', w:1},
  {label:'谢谢参与', bg:'#3a3a3a', fg:'#aaa', type:'none', w:40},
];
const N = SEG.length, ARC = (2*Math.PI)/N;
const cv = document.getElementById('wc');
const ct = cv.getContext('2d');
const bgm = document.getElementById('bgm');
let angle = 0, spinning = false, tot = 0, wins = 0;

function draw(a) {
  ct.clearRect(0,0,300,300);
  const cx=150, cy=150, r=146;
  for(let i=0;i<N;i++){
    const s=a+i*ARC, e=s+ARC;
    ct.beginPath(); ct.moveTo(cx,cy); ct.arc(cx,cy,r,s,e); ct.closePath();
    ct.fillStyle=SEG[i].bg; ct.fill();
    ct.strokeStyle='#111'; ct.lineWidth=1.5; ct.stroke();
    ct.save(); ct.translate(cx,cy); ct.rotate(s+ARC/2);
    ct.textAlign='right'; ct.fillStyle=SEG[i].fg;
    ct.font='bold 12px "Microsoft YaHei",sans-serif';
    ct.fillText(SEG[i].label, r-8, 5);
    ct.restore();
  }
  ct.beginPath(); ct.arc(150,150,22,0,2*Math.PI);
  ct.fillStyle='#ffd700'; ct.fill();
  ct.strokeStyle='#8B4513'; ct.lineWidth=3; ct.stroke();
  ct.fillStyle='#8B0000'; ct.font='bold 13px sans-serif';
  ct.textAlign='center'; ct.textBaseline='middle';
  ct.fillText('GO', 150, 150);
}

function pickIdx() {
  if(Math.random()<0.03){
    const bigs=SEG.map((s,i)=>s.type==='big'?i:-1).filter(i=>i>=0);
    return bigs[Math.floor(Math.random()*bigs.length)];
  }
  const pool=[];
  SEG.forEach((s,i)=>{ if(s.type!=='big') for(let w=0;w<s.w;w++) pool.push(i); });
  return pool[Math.floor(Math.random()*pool.length)];
}

function spin() {
  if(spinning) return;
  spinning=true;
  document.getElementById('sbtn').disabled=true;
  const rbox=document.getElementById('rbox');
  rbox.className=''; rbox.textContent='转转转...';

  try { bgm.currentTime=0; bgm.play(); } catch(e){}

  const idx=pickIdx();
  const target=-(idx*ARC+ARC/2)-Math.PI/2;
  const cur=angle%(2*Math.PI);
  let diff=target-cur;
  diff=diff-Math.floor(diff/(2*Math.PI))*2*Math.PI;
  const finalAngle=angle+diff+(7+Math.floor(Math.random()*3))*2*Math.PI;
  const dur=5400, t0=performance.now(), a0=angle;

  function ease(t){ return 1-Math.pow(1-t,4); }
  (function frame(now){
    const p=Math.min((now-t0)/dur,1);
    angle=a0+(finalAngle-a0)*ease(p);
    draw(angle);
    if(p<1){ requestAnimationFrame(frame); }
    else {
      draw(angle);
      showResult(SEG[idx]);
      spinning=false; document.getElementById('sbtn').disabled=false;
    }
  })(performance.now());
}

function showResult(seg) {
  tot++;
  const box=document.getElementById('rbox');
  if(seg.type==='big'){
    wins++;
    box.className='win';
    box.textContent='🎉 恭喜中了：'+seg.label+'！';
  } else if(seg.type==='small'){
    box.className='';
    box.textContent='🎟️ '+seg.label;
  } else {
    box.className='lose';
    const m=['停……完没中 😭','谢谢惠顾，下次再来～','差一点！（才怪）','概率倍儿高，就是没你份儿'];
    box.textContent=m[Math.floor(Math.random()*m.length)];
  }
  document.getElementById('tot').textContent=tot;
  document.getElementById('wins').textContent=wins;
  document.getElementById('rate').textContent=tot>0?((wins/tot)*100).toFixed(1)+'%':'0%';
  const hist=document.getElementById('hist');
  const b=document.createElement('span');
  b.className='badge '+seg.type; b.textContent=seg.label;
  hist.insertBefore(b,hist.firstChild);
  if(hist.children.length>14) hist.removeChild(hist.lastChild);
}

draw(0);
</script>
